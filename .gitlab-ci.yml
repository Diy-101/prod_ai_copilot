stages:
  # - lint
  - test
  - build
  - deploy

default:
  retry: 2

variables:
  PYTHON_IMAGE: "python:3.12-slim"
  NODE_IMAGE: "node:20-slim"
  BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/backend"
  FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/frontend"
  DEMO_BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/demo-backend"

.python-base:
  image: $PYTHON_IMAGE
  before_script:
    - pip install -r backend/requirements.txt
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/backend

.python-demo-base:
  image: $PYTHON_IMAGE
  before_script:
    - pip install -r demo-backend/requirements.txt pytest
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/demo-backend

.node-base:
  image: $NODE_IMAGE
  before_script:
    - cd frontend && npm ci

# lint-backend:
#   stage: lint
#   extends: .python-base
#   script:
#     - pip install ruff
#     - ruff check backend

# lint-frontend:
#   stage: lint
#   extends: .node-base
#   script:
#     - npm run lint

test-backend:
  stage: test
  extends: .python-base
  script:
    - pytest backend/tests

.docker-setup:
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://localhost:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

build-backend:
  stage: build
  extends: .docker-setup
  script:
    - docker build --pull -t $BACKEND_IMAGE:latest -t $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA ./backend
    - docker push $BACKEND_IMAGE:latest
    - docker push $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA
  only:
    - main
    - master
    - 12hrs

build-frontend:
  stage: build
  extends: .docker-setup
  script:
    - docker build --pull -t $FRONTEND_IMAGE:latest -t $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA ./frontend
    - docker push $FRONTEND_IMAGE:latest
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA
  only:
    - main
    - master
    - 12hrs

build-demo-backend:
  stage: build
  extends: .docker-setup
  script:
    - docker build --pull -t $DEMO_BACKEND_IMAGE:latest -t $DEMO_BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA ./demo-backend
    - docker push $DEMO_BACKEND_IMAGE:latest
    - docker push $DEMO_BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA
  only:
    - main
    - master
    - 12hrs

.deploy-base:
  image: alpine:latest
  resource_group: production-server
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - '[[ -z "$WORKING_SERVER_KEY" ]] && echo "WORKING_SERVER_KEY is empty" && exit 1'
    - '[[ -z "$WORKING_SERVER_IP" ]] && echo "WORKING_SERVER_IP is empty" && exit 1'
    - '[[ -z "$SERVER_USER" ]] && echo "SERVER_USER is empty" && exit 1'
    - 'echo "$WORKING_SERVER_KEY" | tr -d "\r" | ssh-add - > /dev/null'
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - '[[ ! -z "$SSH_KNOWN_HOSTS" ]] && echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts'
  only:
    - main
    - master
    - 12hrs
  environment:
    name: production

deploy-backend:
  stage: deploy
  extends: .deploy-base
  script:
    - |
      ssh -o StrictHostKeyChecking=no $SERVER_USER@$WORKING_SERVER_IP "
        cd ~/backend &&
        rm -f .git/index.lock &&
        sudo docker image prune -af || true &&
        sudo docker builder prune -af || true &&
        sudo docker container prune -f || true &&
        git fetch --all &&
        git reset --hard origin/$CI_COMMIT_REF_NAME &&
        # Переходим в директорию бэкенда и подготавливаем окружение
        cd backend &&
        echo "DOCKER_IMAGE=$BACKEND_IMAGE" > .env &&
        echo "TAG=$CI_COMMIT_SHORT_SHA" >> .env &&
        sudo docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        sudo docker network create shop-network || true &&
        # IMPORTANT: do not use `docker compose down -v` here, DB volume must survive deploys.
        sudo docker compose pull &&
        sudo docker compose up -d
      "

deploy-frontend:
  stage: deploy
  extends: .deploy-base
  script:
    - |
      ssh -o StrictHostKeyChecking=no $SERVER_USER@$WORKING_SERVER_IP "
        cd ~/backend &&
        rm -f .git/index.lock &&
        sudo docker image prune -af || true &&
        sudo docker builder prune -af || true &&
        sudo docker container prune -f || true &&
        git fetch --all &&
        git reset --hard origin/$CI_COMMIT_REF_NAME &&
        cd frontend &&
        echo 'DOCKER_IMAGE=$FRONTEND_IMAGE' > .env &&
        echo 'TAG=$CI_COMMIT_SHORT_SHA' >> .env &&
        sudo docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        sudo docker network create shop-network || true &&
        sudo docker compose pull &&
        sudo docker compose up -d
      "

deploy-demo-backend:
  stage: deploy
  extends: .deploy-base
  script:
    - |
      ssh -o StrictHostKeyChecking=no $SERVER_USER@$WORKING_SERVER_IP "
        cd ~/backend &&
        rm -f .git/index.lock &&
        sudo docker image prune -af || true &&
        sudo docker builder prune -af || true &&
        sudo docker container prune -f || true &&
        git fetch --all &&
        git reset --hard origin/$CI_COMMIT_REF_NAME &&
        cd demo-backend &&
        echo 'DOCKER_IMAGE=$DEMO_BACKEND_IMAGE' > .env &&
        echo 'TAG=$CI_COMMIT_SHORT_SHA' >> .env &&
        sudo docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        sudo docker network create shop-network || true &&
        sudo docker compose pull &&
        sudo docker compose up -d
      "
