services:
  web:
    image: ${DOCKER_IMAGE:-frontend-web}:${TAG:-latest}
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt/live/team-29-main2-8f6819.pages.prodcontest.ru/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/team-29-main2-8f6819.pages.prodcontest.ru/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    networks:
      - shop-network

networks:
  shop-network:
    external: true
