version: 1

services:
  # ==================== API (Web Service) ====================
  api:
    type: web
    name: solution-api
    env: docker
    dockerfilePath: Dockerfile
    buildCommand: ""
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: solution-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: solution-redis
          property: connectionString

  # ==================== PostgreSQL ====================
  db:
    type: pgsql
    name: solution-db
    databaseName: dbname
    user: user
    plan: free
    version: "15"

  # ==================== Redis ====================
  redis:
    type: redis
    name: solution-redis
    plan: free
    version: "7"
