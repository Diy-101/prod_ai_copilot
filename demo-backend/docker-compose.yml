services:
  demo-api:
    image: ${DOCKER_IMAGE:-demo-backend-api}:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8010:8010"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8010/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shop-network

networks:
  shop-network:
    external: true
